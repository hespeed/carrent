<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>社區違規雲端查詢系統 V2.0</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --panel-bg: rgba(255, 255, 255, 0.03);
            --panel-border: rgba(255, 255, 255, 0.08);
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --accent-color: #ef4444;
            --accent-glow: rgba(239, 68, 68, 0.5);
            --accent-hover: #f87171;
            --radius-lg: 16px;
            --radius-md: 12px;
            --radius-sm: 8px;
            --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background-color: var(--bg-color); color: var(--text-primary);
            min-height: 100vh; display: flex; justify-content: center; padding: 2rem;
            position: relative; overflow-x: hidden;
        }

        .background-decor {
            position: fixed; border-radius: 50%; filter: blur(120px); z-index: -1; opacity: 0.3;
        }
        .blob-1 { width: 600px; height: 600px; background: radial-gradient(circle, #7f1d1d 0%, transparent 70%); top: -100px; left: -100px; }

        .container { width: 100%; max-width: 1100px; display: flex; flex-direction: column; gap: 24px; }

        header { text-align: center; margin-bottom: 20px; }
        .logo-icon { font-size: 3rem; margin-bottom: 12px; }
        h1 { font-size: 2.2rem; background: linear-gradient(to right, #ffffff, #94a3b8); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .subtitle { color: var(--text-secondary); margin-top: 8px; }

        .glass-panel {
            background: var(--panel-bg); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--panel-border); border-radius: var(--radius-lg); padding: 32px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
        }

        /* 載入中動畫 */
        .loading-state { text-align: center; padding: 40px; }
        .spinner {
            width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-color);
            border-radius: 50%; animation: spin 1s linear infinite; margin: 0 auto 16px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .search-bar { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; }
        .flex-1 { flex: 1; min-width: 300px; }
        
        select, input[type="text"] {
            width: 100%; padding: 14px; background: rgba(0, 0, 0, 0.2); border: 1px solid var(--panel-border);
            border-radius: var(--radius-sm); color: var(--text-primary); outline: none; transition: var(--transition);
        }
        select:focus, input[type="text"]:focus { border-color: var(--accent-color); }
        
        .primary-btn {
            background: var(--accent-color); color: white; border: none; padding: 0 24px;
            border-radius: var(--radius-sm); font-weight: 600; cursor: pointer; transition: var(--transition);
        }
        .primary-btn:hover { background: var(--accent-hover); box-shadow: 0 0 15px var(--accent-glow); }

        .status-info { font-size: 0.85rem; color: var(--text-secondary); display: flex; justify-content: space-between; }

        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 14px 18px; border-bottom: 1px solid var(--panel-border); text-align: left; font-size: 0.95rem; }
        th { background: rgba(0,0,0,0.3); color: var(--text-secondary); font-size: 0.8rem; text-transform: uppercase; }
        
        /* 關聯高亮 */
        tr.related { background: rgba(239, 68, 68, 0.05); border-left: 3px solid var(--accent-color); }
        .tag-related { font-size: 0.7rem; color: var(--accent-color); font-weight: bold; display: block; }

        .hidden { display: none; }
    </style>
</head>
<body>
    <div class="background-decor blob-1"></div>
    <div class="container">
        <header>
            <div class="logo-icon">🔒</div>
            <h1>社區違規雲端查詢系統</h1>
            <p class="subtitle">即時同步 Google Sheets 違規資料</p>
        </header>

        <div id="loader" class="glass-panel loading-state">
            <div class="spinner"></div>
            <p>正在從雲端同步最新違規資料...</p>
        </div>

        <section id="main-ui" class="hidden">
            <div class="glass-panel">
                <div class="search-bar">
                    <div style="width: 200px;">
                        <select id="search-type">
                            <option value="車牌">汽/機車車牌</option>
                            <option value="地址">住戶地址資訊</option>
                        </select>
                    </div>
                    <div class="flex-1">
                        <input type="text" id="keyword" placeholder="請輸入關鍵字進行搜尋...">
                    </div>
                    <button id="search-btn" class="primary-btn">搜尋</button>
                </div>
                <div class="status-info">
                    <span id="data-count">系統就緒</span>
                    <span id="last-update">上次更新: --</span>
                </div>
            </div>

            <div id="results-panel" class="glass-panel hidden" style="margin-top: 24px; padding: 0;">
                <div style="overflow-x: auto;">
                    <table id="result-table">
                        <thead id="thead"></thead>
                        <tbody id="tbody"></tbody>
                    </table>
                </div>
            </div>
        </section>
    </div>

    <script>
        // 【關鍵：請填入您的 GS 網頁應用程式 URL】
        const API_URL = "https://script.google.com/macros/s/AKfycbyJb-kSGnGlLlSESP7Xv8sAnHtqw_5X-duSe19F0SEnwXET1mX4FEab2DJcYJyU3OKiVw/exec";

        let rawData = [];
        let headers = [];

        // 初始化：從 GS 抓取資料
        window.onload = async () => {
            try {
                const response = await fetch(API_URL);
                const result = await response.json();
                if (result.status === "success") {
                    rawData = result.data;
                    if (rawData.length > 0) {
                        headers = Object.keys(rawData[0]);
                        document.getElementById('data-count').innerText = `雲端資料共 ${result.total} 筆`;
                        document.getElementById('last-update').innerText = `同步時間: ${result.lastUpdate}`;
                    }
                    document.getElementById('loader').classList.add('hidden');
                    document.getElementById('main-ui').classList.remove('hidden');
                }
            } catch (err) {
                alert("無法連線至雲端資料庫，請檢查 API 網址或網路狀態。");
                console.error(err);
            }
        };

        const searchBtn = document.getElementById('search-btn');
        searchBtn.onclick = performSearch;
        document.getElementById('keyword').onkeypress = (e) => { if(e.key === 'Enter') performSearch(); };

        function performSearch() {
            const type = document.getElementById('search-type').value;
            const kw = document.getElementById('keyword').value.trim().toUpperCase();
            if (!kw) return;

            // 1. 找出直接符合的資料
            const matches = rawData.filter(row => {
                if (type === '車牌') {
                    return (row['汽車車牌'] || "").toUpperCase().includes(kw) || 
                           (row['機車車牌'] || "").toUpperCase().includes(kw);
                } else {
                    return (row['住戶地址與相關資訊'] || "").toUpperCase().includes(kw);
                }
            });

            // 2. 獲取關聯地址
            const relatedAddresses = [...new Set(matches.map(r => r['住戶地址與相關資訊']).filter(a => a && a.toUpperCase() !== 'X'))];

            // 3. 找出所有關聯資料並套用排除 X 邏輯
            const finalResults = rawData.filter(row => {
                const addr = row['住戶地址與相關資訊'];
                const isDirect = matches.includes(row);
                const isRelated = relatedAddresses.includes(addr);

                if (isDirect) return true;
                if (isRelated) {
                    const car = (row['汽車車牌'] || "").toUpperCase();
                    const moto = (row['機車車牌'] || "").toUpperCase();
                    // 排除 X 的邏輯：如果是關聯出來的，且車牌都是 X 或空，則不顯示
                    if ((car === 'X' || car === '') && (moto === 'X' || moto === '')) return false;
                    return true;
                }
                return false;
            });

            renderTable(finalResults, matches);
        }

        function renderTable(data, directMatches) {
            const panel = document.getElementById('results-panel');
            const thead = document.getElementById('thead');
            const tbody = document.getElementById('tbody');
            
            panel.classList.remove('hidden');
            thead.innerHTML = '';
            tbody.innerHTML = '';

            if (data.length === 0) {
                tbody.innerHTML = '<tr><td colspan="100" style="text-align:center; padding: 40px;">查無相關違規紀錄</td></tr>';
                return;
            }

            // 建立表頭
            const trH = document.createElement('tr');
            headers.forEach(h => {
                const th = document.createElement('th');
                th.innerText = h;
                trH.appendChild(th);
            });
            thead.appendChild(trH);

            // 建立內容
            data.forEach(row => {
                const tr = document.createElement('tr');
                const isDirect = directMatches.includes(row);
                if (!isDirect) tr.classList.add('related');

                headers.forEach(h => {
                    const td = document.createElement('td');
                    let val = row[h];
                    if (val === 'X') val = ''; // 畫面排除 X 顯示
                    
                    if (h === '住戶地址與相關資訊' && !isDirect) {
                        td.innerHTML = `<span class="tag-related">🔗 自動關聯</span>${val}`;
                    } else {
                        td.innerText = val;
                    }
                    tr.appendChild(td);
                });
                tbody.appendChild(tr);
            });
        }
    </script>
</body>
</html>
