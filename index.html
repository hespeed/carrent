<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禾速車隊 HESPEED - 私人尊榮專車</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #1A2B48;      
            --med-blue: #2C3E50;       
            --gold: #D4AF37;           
            --light-gold: #F9E79F;     
            --bg-soft: #F0F4F8;        
            --shadow-md: 0 10px 20px rgba(0,0,0,0.1);
            --radius-lg: 20px;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding-bottom: 60px; color: #333; margin: 0;
        }

        /* LINE 客服列 (重新加回) */
        .line-header {
            background: linear-gradient(90deg, #BFA071, var(--gold));
            color: white; text-align: center; padding: 12px; font-weight: bold;
            text-decoration: none; display: block; position: sticky; top: 0; z-index: 1001;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.95rem;
        }
        .line-header:hover { color: #f0f0f0; }

        /* 品牌頁首 */
        .brand-header {
            padding: 40px 20px; text-align: center;
            background: linear-gradient(135deg, var(--dark-blue), var(--med-blue));
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            color: var(--light-gold); margin-bottom: 25px; box-shadow: var(--shadow-md);
        }
        .brand-header h1 { font-weight: bold; letter-spacing: 2px; margin-bottom: 5px; }

        /* 卡片容器 */
        .container-form {
            background: white; border-radius: var(--radius-lg);
            padding: 25px; margin: 0 15px; box-shadow: var(--shadow-md);
        }

        .form-label { font-weight: 700; color: var(--dark-blue); margin-top: 12px; display: block; font-size: 0.95rem; }
        
        .label-note {
            font-size: 0.75rem; color: #7F8C8D; font-weight: normal;
            line-height: 1.4; margin-bottom: 8px; display: block;
        }

        .form-control, .form-select {
            border-radius: 12px; border: 2px solid #E1E8ED; padding: 12px; margin-bottom: 5px; transition: 0.3s;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--med-blue), var(--dark-blue));
            color: var(--light-gold); border: none; padding: 15px; border-radius: 12px;
            width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 20px;
        }
        .btn-gold-outline {
            border: 1px solid var(--gold); color: var(--gold); background: transparent;
            padding: 10px; border-radius: 12px; width: 100%; font-weight: bold; margin-top: 15px;
        }

        .menu-btn {
            background: white; border-radius: 18px; padding: 22px; text-align: center;
            margin-bottom: 18px; border: 1px solid #F0F0F0; font-weight: bold;
            color: var(--dark-blue); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .section-title { color: var(--gold); font-weight: bold; border-bottom: 2px solid #EEE; padding-bottom: 5px; margin: 25px 0 10px; }
        .hidden { display: none; }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 43, 72, 0.95); display: none; align-items: center;
            justify-content: center; z-index: 9999; color: var(--light-gold); font-weight: bold;
        }
        .error-hint { color: #dc3545; font-size: 0.85rem; font-weight: bold; margin: 10px 0; text-align: center; }
    </style>
</head>
<body>

<div id="loading">禾速車隊：尊榮連線中...</div>

<a href="https://line.me/R/ti/p/@yourid" target="_blank" class="line-header">官方 LINE 尊榮客服 (緊急聯繫/重設密碼)</a>

<div id="app">
    <div id="page-home">
        <div class="brand-header"><h1>禾速車隊</h1><p>HESPEED VIP SERVICE</p></div>
        <div class="px-3">
            <div id="login-module">
                <div class="menu-btn" onclick="showPage('page-login')">VIP 會員登入 / 註冊</div>
            </div>
            <div class="menu-btn" onclick="checkAuth('page-pickup')">機場接機 (ARRIVAL)</div>
            <div class="menu-btn" onclick="checkAuth('page-dropoff')">機場送機 (DEPARTURE)</div>
            <div class="menu-btn" onclick="checkAuth('page-p2p')">定點接送 (P2P)</div>
        </div>
    </div>

    <div id="page-login" class="hidden">
        <div class="brand-header"><h1>禾速車隊</h1><p>MEMBER LOGIN</p></div>
        <div class="container-form">
            <label class="form-label">會員帳號</label>
            <input type="tel" id="l-phone" class="form-control" placeholder="請輸入手機號碼">
            
            <label class="form-label">密碼設定</label>
            <input type="password" id="l-pwd" class="form-control" placeholder="請輸入6-8碼數字">
            
            <div id="login-msg" class="error-hint hidden"></div>
            
            <button class="btn-action" onclick="loginVerify()">登入</button>
            <p class="text-center mt-4 mb-0" style="font-size:0.9rem; color:#777;">新會員?</p>
            <button class="btn-gold-outline" onclick="showPage('page-reg')">點我，註冊</button>
        </div>
        <button class="btn btn-link w-100 mt-3 text-secondary" onclick="showPage('page-home')">返回首頁</button>
    </div>

    <div id="page-reg" class="hidden">
        <div class="brand-header"><h1>禾速車隊</h1><p>NEW MEMBER</p></div>
        <div class="container-form">
            <label class="form-label">帳號</label>
            <input type="tel" id="r-phone" class="form-control" placeholder="請輸入手機號碼">
            
            <label class="form-label">密碼設定</label>
            <input type="password" id="r-pwd1" class="form-control" placeholder="請輸入6-8碼數字">
            
            <label class="form-label">確認密碼</label>
            <input type="password" id="r-pwd2" class="form-control" placeholder="請再輸入一次密碼">
            
            <button class="btn-action" onclick="registerAction()">註冊</button>
        </div>
        <button class="btn btn-link w-100 mt-3 text-secondary" onclick="showPage('page-login')">返回登入</button>
    </div>

    <div id="page-profile" class="hidden">
        <div class="brand-header">
            <h1 id="p-display-name">會員您好</h1>
            <p id="p-display-phone"></p>
        </div>
        <div class="container-form">
            <div class="section-title">個人資料修訂</div>
            <label class="form-label">姓名</label>
            <input type="text" id="m-name" class="form-control" placeholder="請輸入您的姓名">
            <label class="form-label">手機號碼</label>
            <input type="tel" id="m-phone" class="form-control" readonly>
            <label class="form-label">地址</label>
            <input type="text" id="m-addr" class="form-control" placeholder="請輸入常規聯絡地址">
            <button class="btn-action" onclick="updateInfo('basic')">儲存資料</button>

            <div class="section-title">重設密碼</div>
            <label class="form-label">重新設定新密碼</label>
            <input type="password" id="m-new-pwd1" class="form-control" placeholder="請輸入新密碼">
            <label class="form-label">再次輸入新密碼</label>
            <input type="password" id="m-new-pwd2" class="form-control" placeholder="再輸入一次設定的新密碼">
            <button class="btn-action" style="background:var(--med-blue)" onclick="updateInfo('pwd')">設定密碼</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-4 border-0" onclick="showPage('page-home')">返回首頁</button>
    </div>

    </div>

<script>
    // --- 【設定區】填入您的 URL ---
    const SCRIPT_URL = "您的網址在這裡";
    
    let currentUser = null;
    let failCount = 0;

    function showPage(p) {
        document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(p).classList.remove('hidden');
        window.scrollTo(0,0);
    }

    function toggleLoading(show) {
        document.getElementById('loading').style.display = show ? 'flex' : 'none';
    }

    function checkAuth(target) {
        if(!currentUser) { alert('本尊榮功能限 VIP 會員使用，請先登入。'); showPage('page-login'); } 
        else { showPage(target); }
    }

    // --- 登入驗證 ---
    async function loginVerify() {
        if (failCount >= 3) {
            alert('密碼登錄失敗三次，請用官方 Line 聯絡服務人員重設密碼。');
            return;
        }
        const phone = document.getElementById('l-phone').value.trim();
        const pwd = document.getElementById('l-pwd').value.trim();
        const msgDiv = document.getElementById('login-msg');

        if (!phone || !pwd) { alert('請完整填寫帳號與密碼'); return; }

        toggleLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                mode: 'cors',
                body: JSON.stringify({ targetSheet: "登入驗證", phone: phone, password: pwd })
            }).then(r => r.json());

            if (res.result === "success") {
                currentUser = res.userData;
                failCount = 0;
                setupProfilePage();
                showPage('page-home');
                alert('登入成功，歡迎回來！');
            } else {
                failCount++;
                msgDiv.innerText = `密碼錯誤！剩餘嘗試次數：${3 - failCount}`;
                msgDiv.classList.remove('hidden');
            }
        } catch (e) { alert('連線異常，請檢查網路。'); }
        toggleLoading(false);
    }

    // --- 註冊與資料更新與先前代碼相同 ... ---
    function setupProfilePage() {
        const displayName = (currentUser.name && currentUser.name !== "") ? currentUser.name : "會員您好";
        document.getElementById('p-display-name').innerText = displayName;
        document.getElementById('p-display-phone').innerText = currentUser.phone;
        document.getElementById('m-name').value = currentUser.name || "";
        document.getElementById('m-phone').value = currentUser.phone;
        document.getElementById('m-addr').value = currentUser.addr || "";

        document.getElementById('login-module').innerHTML = `
            <div class="menu-btn" style="border: 2px solid var(--gold); color: var(--gold);" onclick="showPage('page-profile')">VIP 專區 (MEMBER AREA)</div>
            <p class="text-center mt-2 small text-secondary" style="cursor:pointer" onclick="location.reload()">登出 / 切換帳號</p>
        `;
    }

    // (其餘 updateInfo 與 submitBooking 函數請參考前一次回覆之完整 Script 部分)
</script>
</body>
</html>
