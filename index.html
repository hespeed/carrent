<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禾速車隊 HESPEED - 私人尊榮專車</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --dark-blue: #1A2B48;      
            --med-blue: #2C3E50;       
            --gold: #D4AF37;           
            --light-gold: #F9E79F;     
            --line-green: #06C755;
            --bg-soft: #F0F4F8;        
            --shadow-md: 0 10px 20px rgba(0,0,0,0.1);
            --radius-lg: 20px;
        }

        body {
            background-color: var(--bg-soft);
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
            padding-bottom: 60px; color: #333; margin: 0;
        }

        .line-header {
            background: linear-gradient(90deg, #05B34C, var(--line-green));
            color: white; text-align: center; padding: 12px; font-weight: bold;
            text-decoration: none; display: block; position: sticky; top: 0; z-index: 1001;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); font-size: 0.95rem;
        }

        .brand-header {
            padding: 40px 20px; text-align: center;
            background: linear-gradient(135deg, var(--dark-blue), var(--med-blue));
            border-radius: 0 0 var(--radius-lg) var(--radius-lg);
            color: var(--light-gold); margin-bottom: 25px; box-shadow: var(--shadow-md);
        }
        .brand-header h1 { font-weight: bold; letter-spacing: 2px; margin: 0; }

        .container-form {
            background: white; border-radius: var(--radius-lg);
            padding: 25px; margin: 0 15px; box-shadow: var(--shadow-md);
        }

        .form-label { font-weight: 700; color: var(--dark-blue); margin-top: 15px; display: block; font-size: 1.1rem; }
        
        .label-note {
            background: linear-gradient(145deg, rgba(26, 43, 72, 0.05), rgba(44, 62, 80, 0.12));
            border-left: 5px solid var(--gold);
            padding: 15px; margin: 10px 0 18px 0; border-radius: 12px;
            font-size: 0.95rem; color: var(--dark-blue); line-height: 1.6; font-weight: 600;
            box-shadow: inset 0 0 15px rgba(212, 175, 55, 0.08); display: block;
        }
        .label-note::before { content: "◆ 系統提示："; color: var(--gold); margin-right: 5px; }

        .form-control, .form-select {
            border-radius: 12px; border: 2px solid #E1E8ED; padding: 12px; margin-bottom: 5px;
        }

        .btn-action {
            background: linear-gradient(135deg, var(--med-blue), var(--dark-blue));
            color: var(--light-gold); border: none; padding: 15px; border-radius: 12px;
            width: 100%; font-weight: bold; font-size: 1.1rem; margin-top: 10px;
        }

        .menu-btn {
            background: white; border-radius: 18px; padding: 22px; text-align: center;
            margin-bottom: 18px; border: 1px solid #F0F0F0; font-weight: bold;
            color: var(--dark-blue); cursor: pointer; transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }

        .section-title { color: var(--gold); font-weight: bold; border-bottom: 2px solid #EEE; padding-bottom: 8px; margin: 25px 0 15px; font-size: 1.2rem; }
        .hidden { display: none; }
        
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(26, 43, 72, 0.95); display: none; align-items: center;
            justify-content: center; z-index: 9999; color: var(--light-gold); font-weight: bold;
        }
    </style>
</head>
<body>

<div id="loading">禾速車隊：加密通訊中...</div>

<a href="https://line.me" target="_blank" class="line-header">官方 LINE 尊榮客服 (緊急聯繫/重設密碼)</a>

<div id="app">
    <div id="page-home">
        <div class="brand-header"><h1>禾速車隊</h1><p>HESPEED VIP SERVICE</p></div>
        <div class="px-3">
            <div id="login-module"><div class="menu-btn" onclick="showPage('page-login')">VIP 會員登入 / 註冊</div></div>
            <div class="menu-btn" onclick="checkAuth('page-pickup')">機場接機 (ARRIVAL)</div>
            <div class="menu-btn" onclick="checkAuth('page-dropoff')">機場送機 (DEPARTURE)</div>
            <div class="menu-btn" onclick="checkAuth('page-p2p')">定點接送 (P2P)</div>
        </div>
    </div>

    <div id="page-login" class="hidden">
        <div class="brand-header"><h1>會員登入</h1></div>
        <div class="container-form">
            <label class="form-label">手機帳號</label><input type="tel" id="l-phone" class="form-control" placeholder="請輸入手機號碼">
            <label class="form-label">登入密碼</label><input type="password" id="l-pwd" class="form-control" placeholder="請輸入密碼">
            <button class="btn-action" onclick="loginVerify()">登入系統</button>
            <button class="btn btn-outline-secondary w-100 py-2 border-0 mt-3" onclick="showPage('page-reg')">新會員註冊</button>
        </div>
        <button class="btn btn-link w-100 mt-3 text-secondary" onclick="showPage('page-home')">返回首頁</button>
    </div>

    <div id="page-reg" class="hidden">
        <div class="brand-header"><h1>會員註冊</h1></div>
        <div class="container-form">
            <label class="form-label">設定手機帳號</label><input type="tel" id="r-phone" class="form-control">
            <label class="form-label">設定密碼</label><input type="password" id="r-pwd1" class="form-control" placeholder="6-8 碼數字">
            <label class="form-label">確認密碼</label><input type="password" id="r-pwd2" class="form-control">
            <button class="btn-action" onclick="registerAction()">完成註冊</button>
        </div>
        <button class="btn btn-link w-100 mt-3 text-secondary" onclick="showPage('page-login')">返回登入</button>
    </div>

    <div id="page-profile" class="hidden">
        <div class="brand-header">
            <h1 id="p-display-name">會員您好</h1>
            <p id="p-display-phone"></p>
        </div>
        <div class="container-form">
            <div class="section-title">個人資料修訂</div>
            <label class="form-label">姓名</label><input type="text" id="m-name" class="form-control" placeholder="請輸入姓名">
            <label class="form-label">手機號碼</label><input type="tel" id="m-phone" class="form-control" readonly style="background-color: #f8f9fa;">
            <label class="form-label">地址</label><input type="text" id="m-addr" class="form-control" placeholder="請輸入預設接送地址">
            <button class="btn-action" onclick="updateInfo()">儲存資料</button>

            <div class="section-title" style="margin-top: 40px;">帳戶安全</div>
            <label class="form-label">重新設定新密碼</label>
            <input type="password" id="m-new-pwd1" class="form-control" placeholder="請輸入 6-8 碼數字">
            <label class="form-label">確認新密碼</label>
            <input type="password" id="m-new-pwd2" class="form-control" placeholder="請再次輸入新密碼">
            <button class="btn-action" style="background: var(--med-blue);" onclick="resetPassword()">設定密碼</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-4 border-0" onclick="showPage('page-home')">返回首頁</button>
    </div>

    <div id="page-pickup" class="hidden">
        <div class="brand-header"><h2>機場接機</h2></div>
        <div class="container-form">
            <label class="form-label">接機機場</label>
            <select id="p-airport" class="form-select"><option>桃園國際機場</option><option>台北松山機場</option><option>台中清泉崗機場</option><option>高雄小港機場</option></select>
            <label class="form-label">抵達航班</label><input type="text" id="p-flight" class="form-control" placeholder="例: BR197">
            <label class="form-label">預約日期</label><input type="date" id="p-date" class="form-control">
            <label class="form-label">落地時間</label>
            <span class="label-note">若超過落地時間 90 分鐘仍未上車，每 15 分鐘加收 NT$100 逾時費。</span>
            <input type="time" id="p-time" class="form-control">
            <label class="form-label">送達地址</label><input type="text" id="p-addr-to" class="form-control">
            <label class="form-label">人數</label><select id="p-pcount" class="form-select" onchange="autoCar('p-pcount','p-cartype')"><option value="1-3">1-3人</option><option value="4-8">4-8人</option></select>
            <label class="form-label">車型</label><select id="p-cartype" class="form-select"><option>四人座轎車</option><option>豪華 VIP 7-9人座</option></select>
            <label class="form-label">行李數</label><select id="p-lcount" class="form-select"></select>
            <label class="form-label">行李備註</label>
            <textarea id="p-lnote" class="form-control" rows="3" placeholder="例如：28吋*2, 20吋*1"></textarea>
            <button class="btn-action" onclick="submitBooking('機場接機')">確認接機預約</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-3 border-0" onclick="showPage('page-home')">返回</button>
    </div>

    <div id="page-dropoff" class="hidden">
        <div class="brand-header"><h2>機場送機</h2></div>
        <div class="container-form">
            <label class="form-label">目的地機場</label>
            <select id="d-airport" class="form-select"><option>桃園國際機場</option><option>台北松山機場</option><option>台中清泉崗機場</option><option>高雄小港機場</option></select>
            <label class="form-label">預預日期</label><input type="date" id="d-date" class="form-control">
            <label class="form-label">上車時間</label>
            <span class="label-note">若超過預定時間 15 分鐘，每 15 分鐘加收 NT$100 逾時費。</span>
            <input type="time" id="d-time" class="form-control">
            <label class="form-label">上車地址</label><input type="text" id="d-addr" class="form-control">
            <label class="form-label">人數</label><select id="d-pcount" class="form-select" onchange="autoCar('d-pcount','d-cartype')"><option value="1-3">1-3人</option><option value="4-8">4-8人</option></select>
            <label class="form-label">車型</label><select id="d-cartype" class="form-select"><option>四人座轎車</option><option>豪華 VIP 7-9人座</option></select>
            <label class="form-label">行李數</label><select id="d-lcount" class="form-select"></select>
            <label class="form-label">行李備註</label>
            <textarea id="d-lnote" class="form-control" rows="3" placeholder="例如：28吋*2"></textarea>
            <button class="btn-action" onclick="submitBooking('機場送機')">確認送機預約</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-3 border-0" onclick="showPage('page-home')">返回</button>
    </div>

    <div id="page-p2p" class="hidden">
        <div class="brand-header"><h2>定點接送</h2></div>
        <div class="container-form">
            <label class="form-label">預約日期</label><input type="date" id="o-date" class="form-control">
            <label class="form-label">上車時間</label><input type="time" id="o-time" class="form-control">
            <label class="form-label">起點地址</label><input type="text" id="o-addr-start" class="form-control">
            <label class="form-label">終點地址</label><input type="text" id="o-addr-end" class="form-control">
            <label class="form-label">人數</label><select id="o-pcount" class="form-select" onchange="autoCar('o-pcount','o-cartype')"><option value="1-3">1-3人</option><option value="4-8">4-8人</option></select>
            <label class="form-label">車型</label><select id="o-cartype" class="form-select"><option>四人座轎車</option><option>豪華 VIP 7-9人座</option></select>
            <label class="form-label">行李數</label><select id="o-lcount" class="form-select"></select>
            <label class="form-label">需求備註</label>
            <textarea id="o-lnote" class="form-control" rows="3" placeholder="需求備註"></textarea>
            <button class="btn-action" onclick="submitBooking('定點交通')">確認定點預約</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-3 border-0" onclick="showPage('page-home')">返回</button>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby6rIx6MRkyGc4X1PNeVNY06rHxvh7Sfek4CkULFy_DV9ehxw0fnH3VbI7n2QImXQGveg/exec";
    let currentUser = null;

    ['p-lcount', 'd-lcount', 'o-lcount'].forEach(id => {
        const el = document.getElementById(id);
        if(el) for(let i=1; i<=10; i++) el.options.add(new Option(i + " 件", i));
    });

    function showPage(p) {
        document.querySelectorAll('#app > div').forEach(div => div.classList.add('hidden'));
        document.getElementById(p).classList.remove('hidden'); window.scrollTo(0,0);
    }
    function toggleLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
    function checkAuth(t) { if(!currentUser){ alert('請先登入'); showPage('page-login'); } else showPage(t); }

    function autoCar(pId, cId) {
        if(document.getElementById(pId).value === '4-8') {
            document.getElementById(cId).value = '豪華 VIP 7-9人座';
            alert('VIP 提示：偵測到人數較多，已自動為您選配 7-9 人座。');
        }
    }

    async function loginVerify() {
        const phone = document.getElementById('l-phone').value;
        const pwd = document.getElementById('l-pwd').value;
        if(!phone || !pwd) return alert('請輸入帳密');
        toggleLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ targetSheet: "登入驗證", phone, password: pwd }) }).then(r => r.json());
            if(res.result === "success") { currentUser = res.userData; setupProfile(); showPage('page-home'); }
            else alert('登入失敗');
        } catch(e) { alert('連線異常'); }
        toggleLoading(false);
    }

    async function registerAction() {
        const phone = document.getElementById('r-phone').value;
        const pw1 = document.getElementById('r-pwd1').value;
        const pw2 = document.getElementById('r-pwd2').value;
        if(!phone || pw1 !== pw2) return alert('請確認密碼一致');
        toggleLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ targetSheet: "會員註冊", phone, password: pw1 }) }).then(r => r.json());
            if(res.result === "success") { alert('註冊成功！'); showPage('page-login'); }
        } catch(e) { alert('註冊異常'); }
        toggleLoading(false);
    }

    function setupProfile() {
        const displayName = currentUser.name ? `${currentUser.name} 您好` : "會員您好";
        document.getElementById('p-display-name').innerText = displayName;
        document.getElementById('p-display-phone').innerText = currentUser.phone;
        document.getElementById('m-name').value = currentUser.name || "";
        document.getElementById('m-phone').value = currentUser.phone;
        document.getElementById('m-addr').value = currentUser.addr || "";
        
        document.getElementById('login-module').innerHTML = `
            <div class="menu-btn" style="border:1px solid var(--gold); color:var(--gold)" onclick="showPage('page-profile')">
                ${displayName} (VIP 專區)
            </div>
            <p class="text-center small text-secondary" style="cursor:pointer" onclick="location.reload()">登出</p>
        `;
    }

    async function updateInfo() {
        let payload = { 
            targetSheet: "更新資料", 
            phone: currentUser.phone, 
            newName: document.getElementById('m-name').value, 
            newAddr: document.getElementById('m-addr').value 
        };
        toggleLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) }).then(r => r.json());
            if(res.result === "success") alert('VIP 個人資料已更新');
        } catch(e) { alert('更新失敗'); }
        toggleLoading(false);
    }

    async function resetPassword() {
        const p1 = document.getElementById('m-new-pwd1').value;
        const p2 = document.getElementById('m-new-pwd2').value;
        if(!p1 || p1 !== p2) return alert('請輸入一致的新密碼');
        toggleLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ targetSheet: "重設密碼", phone: currentUser.phone, newPassword: p1 }) 
            }).then(r => r.json());
            if(res.result === "success") alert('密碼設定成功！');
        } catch(e) { alert('系統忙碌中'); }
        toggleLoading(false);
    }

    async function submitBooking(type) {
        const prefix = type === '機場接機' ? 'p' : (type === '機場送機' ? 'd' : 'o');
        let data = { targetSheet: "訂單資料", type: type, account: currentUser.phone };
        
        if(type==='機場接機') {
            data.start = document.getElementById('p-airport').value;
            data.end = document.getElementById('p-addr-to').value;
            data.flight = document.getElementById('p-flight').value;
        } else if(type==='機場送機') {
            data.start = document.getElementById('d-addr').value;
            data.end = document.getElementById('d-airport').value;
        } else {
            data.start = document.getElementById('o-addr-start').value;
            data.end = document.getElementById('o-addr-end').value;
        }

        data.date = document.getElementById(prefix + '-date').value;
        data.time = document.getElementById(prefix + '-time').value;
        data.pCount = document.getElementById(prefix + '-pcount').value;
        data.carType = document.getElementById(prefix + '-cartype').value;
        data.lCount = document.getElementById(prefix + '-lcount').value;
        data.lNote = document.getElementById(prefix + '-lnote').value;

        if(!data.date || !data.time) return alert('請填寫完整日期時間');

        toggleLoading(true);
        try {
            const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(data) }).then(r => r.json());
            if(res.result === "success") { alert('預約成功，禾速管家將與您聯繫！'); showPage('page-home'); }
        } catch(e) { alert('傳送失敗'); }
        toggleLoading(false);
    }
</script>
</body>
</html>
