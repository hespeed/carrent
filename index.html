<style>
    .error-count { color: red; font-size: 0.8rem; margin-top: 5px; }
    .pwd-section { border-top: 1px solid #eee; margin-top: 20px; padding-top: 20px; }
</style>

<div id="app">
    <div id="page-login" class="hidden">
        <div class="brand-header"><h2>禾速車隊</h2><p>MEMBER LOGIN</p></div>
        <div class="container-form">
            <label class="form-label fw-bold">會員帳號</label>
            <input type="tel" id="l-phone" class="form-control mb-3" placeholder="請輸入手機號碼">
            <label class="form-label fw-bold">密碼設定</label>
            <input type="password" id="l-pwd" class="form-control mb-3" placeholder="請輸入6-8碼數字">
            <div id="login-msg" class="error-count mb-2"></div>
            <button class="btn-action" onclick="loginVerify()">登入 (LOGIN)</button>
            <button class="btn btn-link w-100 mt-3 text-secondary" onclick="showPage('page-reg')">新會員?點我，註冊</button>
        </div>
    </div>

    <div id="page-profile" class="hidden">
        <div class="brand-header">
            <h2 id="u-display-name">會員您好</h2>
            <p id="u-display-phone">0900-000-000</p>
        </div>
        <div class="container-form">
            <label class="form-label">姓名</label><input type="text" id="p-name" class="form-control mb-3" placeholder="請填寫您的姓名">
            <label class="form-label">手機號碼</label><input type="tel" id="p-phone" class="form-control mb-3" readonly>
            <label class="form-label">地址</label><input type="text" id="p-addr" class="form-control mb-3" placeholder="請輸入通訊地址">
            <button class="btn-action" onclick="updateInfo('basic')">儲存個人資料</button>

            <div class="pwd-section">
                <p class="fw-bold" style="color:var(--v-orange)">重設密碼</p>
                <label class="form-label">重新設定新密碼</label>
                <input type="password" id="p-new-pwd1" class="form-control mb-3" placeholder="請輸入新密碼">
                <label class="form-label">再輸入一次設定的新密碼</label>
                <input type="password" id="p-new-pwd2" class="form-control mb-3" placeholder="請再次確認新密碼">
                <button class="btn-action" style="background: #666;" onclick="updateInfo('pwd')">設定密碼</button>
            </div>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-4 border-0" onclick="showPage('page-home')">返回首頁</button>
    </div>
</div>

<script>
    let loginFailCount = 0;
    let currentUser = null;

    // 登入驗證 (對接試算表)
    async function loginVerify() {
        if (loginFailCount >= 3) {
            alert('密碼登錄失敗三次！請點擊官方Line聯絡服務人員重設密碼。');
            window.location.href = "您的Line連結";
            return;
        }

        const phone = document.getElementById('l-phone').value;
        const pwd = document.getElementById('l-pwd').value;
        
        document.getElementById('loading').style.display = 'flex';
        const resp = await fetch(SCRIPT_URL, {
            method: 'POST',
            body: JSON.stringify({ targetSheet: "登入驗證", phone: phone, password: pwd })
        });
        const res = await resp.json();
        document.getElementById('loading').style.display = 'none';

        if (res.result === "success") {
            currentUser = res.userData;
            loginFailCount = 0;
            initMemberArea();
        } else {
            loginFailCount++;
            document.getElementById('login-msg').innerText = `密碼錯誤！剩餘嘗試次數：${3 - loginFailCount}`;
            if (loginFailCount >= 3) alert('帳號已鎖定，請聯絡官方Line。');
        }
    }

    // 初始化會員專區顯示
    function initMemberArea() {
        const name = currentUser.name || "";
        document.getElementById('u-display-name').innerText = name ? `${name} 先生/小姐` : "會員您好";
        document.getElementById('u-display-phone').innerText = currentUser.phone;
        document.getElementById('p-name').value = name;
        document.getElementById('p-phone').value = currentUser.phone;
        document.getElementById('p-addr').value = currentUser.addr || "";
        
        // 修改首頁按鈕
        document.getElementById('main-menu').innerHTML = `
            <div class="menu-btn" onclick="showPage('page-profile')">會員專區 (MEMBER)</div>
            <div class="menu-btn" onclick="showPage('page-pickup')">機場接機</div>
            <div class="menu-btn" onclick="showPage('page-dropoff')">機場送機</div>
            <div class="menu-btn" onclick="showPage('page-p2p')">定點交通</div>
        `;
        showPage('page-home');
    }

    // 更新資料與重設密碼
    async function updateInfo(mode) {
        let payload = { targetSheet: "更新資料", phone: currentUser.phone };
        
        if (mode === 'basic') {
            payload.newName = document.getElementById('p-name').value;
            payload.newAddr = document.getElementById('p-addr').value;
        } else {
            const pw1 = document.getElementById('p-new-pwd1').value;
            const pw2 = document.getElementById('p-new-pwd2').value;
            if (pw1 !== pw2 || pw1 === "") { alert('兩次密碼輸入不一致！'); return; }
            payload.newPwd = pw1;
        }

        document.getElementById('loading').style.display = 'flex';
        await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify(payload) });
        document.getElementById('loading').style.display = 'none';
        alert('資料設定完成！');
        if (mode === 'basic') {
            currentUser.name = payload.newName;
            document.getElementById('u-display-name').innerText = payload.newName ? `${payload.newName} 先生/小姐` : "會員您好";
        }
    }
</script>
