<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>禾速車隊 - 尊榮接送服務</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.1/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        :root {
            --brand-gold: #D4AF37;
            --brand-dark: #1A1A1A;
            --brand-gray: #2C2C2C;
            --bg-light: #f8f9fa;
        }

        body { 
            background-color: var(--bg-light); 
            font-family: "Microsoft JhengHei", sans-serif; 
            padding-bottom: 50px;
        }
        
        .line-header { 
            background-color: #00b900; color: white; text-align: center; padding: 12px; 
            font-weight: bold; text-decoration: none; display: block; position: sticky; top: 0; z-index: 1000;
        }

        .brand-section { 
            background: linear-gradient(135deg, var(--brand-dark), var(--brand-gray)); 
            color: var(--brand-gold); padding: 40px 20px; text-align: center; border-bottom: 4px solid var(--brand-gold); 
        }
        .brand-logo { font-size: 2.5rem; font-weight: 800; letter-spacing: 5px; }

        .image-showcase {
            width: 100%; height: 220px; overflow: hidden; border-radius: 15px; margin-top: -20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.15); background-color: #333;
        }
        .image-showcase img { width: 100%; height: 100%; object-fit: cover; }

        .nav-card { 
            background: white; border: none; border-radius: 15px; padding: 20px; text-align: center; 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05); transition: 0.3s; cursor: pointer;
            text-decoration: none; color: var(--brand-dark); display: block; margin-bottom: 15px;
        }
        .nav-card:hover { transform: translateY(-3px); border-left: 6px solid var(--brand-gold); }

        .form-container {
            background: white; padding: 25px; border-radius: 20px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-top: 20px;
        }
        .btn-gold { background-color: var(--brand-gold); color: white; border: none; padding: 12px; font-weight: bold; border-radius: 10px; width: 100%; }
        
        .img-grid-container { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .img-placeholder { background: #eee; border-radius: 10px; display: flex; align-items: center; justify-content: center; color: #999; min-height: 100px; font-size: 0.8rem; text-align: center; }
        .img-large { grid-column: span 2; min-height: 150px; }

        .note-text { font-size: 0.85rem; color: #d9534f; margin-top: 5px; font-weight: bold; }
        .price-card { background: white; border-radius: 12px; padding: 15px; border-top: 4px solid var(--brand-gold); }
    </style>
</head>
<body>

<a href="#" class="line-header">LINE 官方帳號預約：@hespeed</a>

<div id="app">
    <div id="view-home">
        <div class="brand-section">
            <div class="brand-logo">禾速車隊</div>
            <p class="small text-uppercase mb-0">He Speed Premium Transport</p>
        </div>
        <div class="container">
            <div class="image-showcase">
                <img src="https://images.unsplash.com/photo-1549317661-bd32c8ce0db2?auto=format&fit=crop&w=800&q=80" alt="禾速車隊">
            </div>
            <div class="mt-4">
                <div class="nav-card" onclick="showView('login')"><h5>👤 會員登入 / 專區</h5></div>
                <div class="row g-3">
                    <div class="col-6"><div class="nav-card" onclick="showView('pickup')"><h5>🛬 機場接機</h5></div></div>
                    <div class="col-6"><div class="nav-card" onclick="showView('dropoff')"><h5>🛫 機場送機</h5></div></div>
                    <div class="col-12"><div class="nav-card" onclick="showView('p2p')"><h5>📍 定點交通</h5></div></div>
                </div>
            </div>
        </div>
    </div>

    <div id="view-dropoff" style="display:none;" class="container p-3">
        <div class="text-center mb-3"><h4 class="fw-bold">禾速車隊 - 機場送機</h4></div>
        <div class="img-grid-container">
            <div class="img-placeholder">圖檔預留 1</div>
            <div class="img-placeholder">圖檔預留 2</div>
            <div class="img-placeholder img-large">下圖預留 (賓士九人座)</div>
        </div>
        <div class="form-container">
            <div class="mb-3">
                <label class="form-label fw-bold">送機機場</label>
                <select class="form-select"><option>台北松山機場</option><option>桃園國際機場</option><option>台中清泉崗機場</option><option>高雄小港機場</option></select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">航班編號</label>
                <input type="text" class="form-control" placeholder="請輸入航班編號">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">訂車日期</label>
                <input type="date" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">預定送機時間</label>
                <input type="time" class="form-control">
                <p class="note-text">※ 服務人員將視狀況告知正確接車時間。</p>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">上車地址</label>
                <input type="text" class="form-control" placeholder="請輸入正確地址">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">搭乘人數</label>
                <select id="p-count-drop" class="form-select" onchange="autoSelect('p-count-drop', 'car-type-drop')">
                    <option value="1-3">1~3人</option><option value="4-8">4~8人</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">選擇車型</label>
                <select id="car-type-drop" class="form-select">
                    <option value="sedan">四人座轎車</option><option value="suv">四人座休旅車</option><option value="luxury">豪華7~9人座車</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">行李數量 (1~10)</label>
                <input type="number" class="form-control" min="1" max="10" value="1">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">行李類型說明</label>
                <textarea class="form-control" rows="2" placeholder="請註明行李箱尺寸與數量、輪椅等"></textarea>
                <p class="small text-muted mt-1">※ 若上車現場與登錄不符，將另行計算現場報價。</p>
            </div>
            <button class="btn btn-gold" onclick="alert('送機訂單已送出')">確認預約送機</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-4" onclick="showView('home')">返回首頁</button>
    </div>

    <div id="view-p2p" style="display:none;" class="container p-3">
        <div class="text-center mb-3"><h4 class="fw-bold">禾速車隊 - 定點交通</h4></div>
        <div class="img-grid-container">
            <div class="img-placeholder">圖檔預留 1</div>
            <div class="img-placeholder">圖檔預留 2</div>
            <div class="img-placeholder img-large">下圖預留 (賓士九人座)</div>
        </div>
        <div class="form-container">
            <div class="mb-3">
                <label class="form-label fw-bold">出發地點</label>
                <input type="text" class="form-control" placeholder="請輸入正確地址">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">目的地點</label>
                <input type="text" class="form-control" placeholder="請輸入正確地址">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">訂車日期</label>
                <input type="date" class="form-control">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">預定時間</label>
                <input type="time" class="form-control">
                <p class="note-text">※ 超過預定，每15分鐘加收NT$100逾時費。</p>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">搭乘人數</label>
                <select id="p-count-p2p" class="form-select" onchange="autoSelect('p-count-p2p', 'car-type-p2p')">
                    <option value="1-3">1~3人</option><option value="4-8">4~8人</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">選擇車型</label>
                <select id="car-type-p2p" class="form-select">
                    <option value="sedan">四人座轎車</option><option value="suv">四人座休旅車</option><option value="luxury">豪華7~9人座車</option>
                </select>
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">行李數量 (1~10)</label>
                <input type="number" class="form-control" min="1" max="10" value="1">
            </div>
            <div class="mb-3">
                <label class="form-label fw-bold">行李類型說明</label>
                <textarea class="form-control" rows="2" placeholder="行李箱、輪椅等"></textarea>
            </div>
            <button class="btn btn-gold" onclick="alert('定點交通訂單已送出')">確認預約接駁</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-4" onclick="showView('home')">返回首頁</button>
    </div>

    </div>

<script>
    function showView(viewId) {
        const views = ['home', 'login', 'register', 'pickup', 'dropoff', 'p2p'];
        views.forEach(v => {
            const el = document.getElementById('view-' + v);
            if(el) el.style.display = 'none';
        });
        document.getElementById('view-' + viewId).style.display = 'block';
        window.scrollTo(0, 0);
    }

    // 通用的防呆邏輯
    function autoSelect(countId, carId) {
        const count = document.getElementById(countId).value;
        const carType = document.getElementById(carId);
        if (count === '4-8') {
            carType.value = 'luxury';
            alert('人數超過4人，已自動選取豪華 7~9 人座車。');
        }
    }
</script>

</body>
</html>
