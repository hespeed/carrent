<div id="page-profile" class="hidden">
        <div class="brand-header">
            <h1 id="p-display-name">會員您好</h1>
            <p id="p-display-phone"></p>
        </div>
        
        <div class="container-form">
            <div class="section-title">個人資料修訂</div>
            <label class="form-label">姓名</label>
            <input type="text" id="m-name" class="form-control" placeholder="請輸入姓名">
            
            <label class="form-label">手機號碼</label>
            <input type="tel" id="m-phone" class="form-control" readonly style="background-color: #e9ecef;">
            <small class="text-muted">* 手機帳號不可修改</small>
            
            <label class="form-label">地址</label>
            <input type="text" id="m-addr" class="form-control" placeholder="請輸入接送地址">
            
            <button class="btn-action" onclick="updateInfo()">儲存資料</button>

            <div class="section-title" style="margin-top: 40px;">帳戶安全</div>
            <label class="form-label">重新設定新密碼</label>
            <input type="password" id="m-new-pwd1" class="form-control" placeholder="請輸入新密碼 (6-8碼數字)">
            
            <label class="form-label">再次確認新密碼</label>
            <input type="password" id="m-new-pwd2" class="form-control" placeholder="請再次輸入新密碼">
            
            <button class="btn-action" style="background: var(--med-blue);" onclick="resetPassword()">設定新密碼</button>
        </div>
        <button class="btn btn-outline-secondary w-100 mt-4 border-0" onclick="showPage('page-home')">返回首頁</button>
    </div>
